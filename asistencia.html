<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduSync | Gestión de Aula</title>
    <link rel="stylesheet" href="./src/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body class="subpage">

    <header class="navbar">
        <div class="logo">
            <a href="index.html" style="text-decoration: none; color: inherit;"><h1>EduSync</h1></a>
        </div>
        <nav class="breadcrumb">
            <a href="index.html">Inicio</a> / <span>Gestión de Aula</span>
        </nav>
    </header>

    <main class="dashboard-container">
        <section class="section-header">
            <h2>Pase de Asistencia - Kínder B</h2>
            <p>Fecha: <span id="current-date">12 de Abril, 2026</span></p>
        </section>

        <div class="attendance-grid">
            <div class="student-list card">
                <h3>Lista de Párvulos</h3>
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>Alumno</th>
                            <th>Estado</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td>Benjamín Arancibia</td>
                            <td><button class="status-pill present">Presente</button></td>
                        </tr>
                        <tr>
                            <td>Sofía Henríquez</td>
                            <td><button class="status-pill present">Presente</button></td>
                        </tr>
                        <tr>
                            <td>Martina Osses</td>
                            <td><button class="status-pill absent">Ausente</button></td>
                        </tr>
                        <tr>
                            <td>Lucas Villavicencio</td>
                            <td><button class="status-pill present">Presente</button></td>
                        </tr>
                    </tbody>
                </table>
                <button class="save-btn primary">Finalizar Registro</button>
            </div>

            <div class="log-section card">
                <h3>Bitácora Diaria</h3>
                <textarea placeholder="Observaciones pedagógicas del día, accidentes o hitos relevantes..."></textarea>
                <div class="tag-cloud">
                    <span class="tag">Alimentación</span>
                    <span class="tag">Actividad Física</span>
                    <span class="tag">Salud</span>
                </div>
                <button class="save-btn secondary">Guardar Bitácora</button>
            </div>
        </div>
    </main>
</body>
</html>
